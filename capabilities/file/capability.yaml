id: file
name: File Capability
description: Read local text, image, and audio files from configured allowed directories. This can access local files; it is not a sandbox.

permissions:
  filesystem:
    read: true

config_schema:
  - name: allowed_directories
    type: json
    label: Allowed directories
    default:
      - ./data
      - ./examples
      - ./agents
      - ./capabilities
    description: Directories that /read-file is allowed to read. Relative paths resolve from the project root.

  - name: max_local_text_read_size_mb
    type: float
    label: Max local text read size
    default: 2
    minimum: 0.1
    maximum: 100
    description: Maximum local text file size for /read-file.

  - name: max_local_image_read_size_mb
    type: float
    label: Max local image read size
    default: 10
    minimum: 0.1
    maximum: 100
    description: Maximum local image size for /read-file image results.

  - name: max_local_audio_read_size_mb
    type: float
    label: Max local audio read size
    default: 10
    minimum: 0.1
    maximum: 100
    description: Maximum local audio file size for /read-file audio results.

  - name: max_local_video_read_size_mb
    type: float
    label: Max local video read size
    default: 5120
    minimum: 0.1
    maximum: 5120
    description: Maximum local video file size for /read-file video outputs.

  - name: allowed_text_extensions
    type: json
    label: Allowed text extensions
    default:
      - .txt
      - .md
      - .py
      - .js
      - .ts
      - .tsx
      - .jsx
      - .json
      - .yaml
      - .yml
      - .toml
      - .xml
      - .html
      - .css
      - .env
      - .log
      - .csv
      - .sql
      - .sh
      - .ps1
      - .bat
      - .ini
      - .cfg
    description: Text file extensions allowed by /read-file.

  - name: enable_read_file_command
    type: boolean
    label: Enable /read-file
    default: true
    description: Enable /read-file.

methods:
  - id: read_file
    description: Read a supported local file from an allowed local directory and render it as the appropriate Message Part.
    input_schema:
      path:
        type: string
        required: true
    output:
      part_type: parts

  - id: read_text
    description: Read a UTF-8 text file from an allowed local directory
    input_schema:
      path:
        type: string
        required: true
    output:
      part_type: file
      mode: inline_text

  - id: read_image
    description: Read a local image file from an allowed local directory
    input_schema:
      path:
        type: string
        required: true
    output:
      part_type: image

  - id: read_audio
    description: Read a local audio file from an allowed local directory
    input_schema:
      path:
        type: string
        required: true
    output:
      part_type: audio

commands:
  - name: /read-file
    method: read_file
    description: Read a local file from an allowed local directory.
    safe: true
