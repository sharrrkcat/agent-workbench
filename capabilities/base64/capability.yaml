id: base64
name: Base64 Capability
description: Base64 encoding and decoding

config_schema:
  - name: mode
    type: enum
    label: Mode
    required: false
    options:
      - "on"
      - "off"
    description: Lightweight test setting for config validation.

methods:
  - id: encode
    description: Encode text to Base64
    input_schema:
      text:
        type: string
        required: true
    output:
      part_type: text
      format: plain

  - id: decode
    description: Decode Base64 text
    input_schema:
      text:
        type: string
        required: true
    output:
      part_type: text
      format: plain

  - id: decode_image
    description: Decode Base64 image data into a renderable image message
    input_schema:
      text:
        type: string
        required: true
    output:
      part_type: image

  - id: encode_image
    description: Encode the current user message image attachment as Base64
    input_schema:
      text:
        type: string
        required: false
    output:
      part_type: json

commands:
  - name: /base64
    method: encode
    description: Encode text to Base64
    safe: true

  - name: /base64-decode
    method: decode
    description: Decode Base64 text
    safe: true

  - name: /base64-image
    method: decode_image
    description: Decode Base64 image data into an image
    safe: true

  - name: /base64-to-image
    method: decode_image
    description: Decode Base64 image data into an image
    safe: true

  - name: /image-base64
    method: encode_image
    description: Encode the current message image attachment to Base64
    safe: true

  - name: /base64-encode-image
    method: encode_image
    description: Encode the current message image attachment to Base64
    safe: true
