id: codec
name: Codec Capability
description: Encode and decode Base64, Base64URL, URL percent encoding, Unicode escapes, hex text, generate QR codes, and convert image attachments/data URLs where supported.

config_schema:
  - name: max_text_input_chars
    type: integer
    default: 200000
    minimum: 1
    description: Maximum text payload characters accepted by Codec commands.
  - name: max_decoded_bytes_mb
    type: integer
    default: 25
    minimum: 1
    description: Maximum decoded byte size for Codec decode.
  - name: max_attachment_encode_mb
    type: integer
    default: 10
    minimum: 1
    description: Maximum image attachment size allowed for Base64 encoding.
  - name: enable_attachment_encode
    type: boolean
    default: true
    description: Allow encoding the current message image attachment as Base64.
  - name: max_qr_text_chars
    type: integer
    default: 2000
    minimum: 1
    description: Maximum text length accepted by QR generation.
  - name: qr_scale
    type: integer
    default: 8
    minimum: 1
    description: PNG scale used when rendering QR codes.

methods:
  - id: encode
    description: Encode text or the current image attachment with a named codec.
    input_schema:
      codec:
        type: string
        required: true
      text:
        type: string
        required: false
    output:
      part_type: parts

  - id: decode
    description: Decode text with a named codec.
    input_schema:
      codec:
        type: string
        required: true
      text:
        type: string
        required: true
    output:
      part_type: parts

commands:
  - name: /encode
    method: encode
    description: Encode text or the current image attachment.
    safe: true

  - name: /decode
    method: decode
    description: Decode text.
    safe: true
