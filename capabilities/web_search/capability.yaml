id: web_search
name: Web Search
description: Search SearXNG and return normalized search results without fetching result pages.

permissions:
  network:
    http: true

config_schema:
  - name: enable_web_search_command
    type: boolean
    label: Enable /web-search
    default: true
    description: Enable /web-search for SearXNG query searches.

  - name: searxng_base_url
    type: string
    label: SearXNG Base URL
    default: http://localhost:8888
    description: Base URL for the SearXNG service.

  - name: timeout_seconds
    type: float
    label: Timeout seconds
    default: 10
    minimum: 1
    maximum: 60
    description: Search request timeout in seconds.

  - name: max_results
    type: integer
    label: Max results
    default: 8
    minimum: 1
    maximum: 20
    description: Maximum number of normalized search results to return.

  - name: language
    type: string
    label: Language
    default: auto
    description: SearXNG language parameter. Use auto to keep the provider default.

  - name: safe_search
    type: enum
    label: Safe search
    default: default
    options:
      - "default"
      - "off"
      - "moderate"
      - "strict"
    description: SearXNG safe search level. Default leaves the provider setting unchanged.

  - name: result_filter_enabled
    type: boolean
    label: Enable result filtering
    default: true
    description: Apply domain filters and result de-duplication after SearXNG normalization.

  - name: domain_blocklist
    type: text
    label: Domain blocklist
    default: ""
    description: One domain pattern per line. Matching domains are excluded. Supports example.com, *.example.com, and .example.com.

  - name: domain_allowlist
    type: text
    label: Domain allowlist
    default: ""
    description: One domain pattern per line. When set, only matching domains are kept. Supports example.com, *.example.com, and .example.com.

  - name: dedupe_results
    type: boolean
    label: Deduplicate results
    default: true
    description: Remove duplicate normalized URLs while preserving provider order.

  - name: dedupe_same_domain_title
    type: boolean
    label: Deduplicate same-domain titles
    default: true
    description: Remove later results with the same normalized title on the same domain.

methods:
  - id: search
    description: Search SearXNG and render normalized results as Message Parts.
    input_schema:
      query:
        type: string
        required: true
    output:
      part_type: parts

commands:
  - name: /web-search
    method: search
    description: Search SearXNG and return normalized search results.
    safe: true
