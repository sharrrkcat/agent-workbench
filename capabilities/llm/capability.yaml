id: llm
name: LLM Capability
description: OpenAI-compatible local LLM runtime

config_schema:
  - name: base_url
    type: string
    label: Base URL
    default: http://localhost:1234/v1
    description: OpenAI-compatible API base URL.
  - name: api_key
    type: string
    label: API key
    required: false
    secret: true
    description: Optional bearer token for local or compatible providers.
  - name: model
    type: string
    label: Model
    required: false
    description: Optional default model for later unified LLM config.
  - name: timeout
    type: float
    label: Timeout
    default: 60
    required: false
    description: Request timeout in seconds.

methods:
  - id: generate
    description: Generate text from a prompt
    input_schema:
      prompt:
        type: string
        required: true
    output:
      type: text

  - id: chat
    description: Generate text from chat messages
    input_schema:
      messages:
        type: array
        required: true
    output:
      type: text

  - id: unload
    description: Best-effort model unload
    output:
      type: object
