id: pet
name: Pet
description: Manage local Codex-compatible Workbench Pet assets and settings.

config_schema:
  - name: pet_enabled
    type: boolean
    label: Enable Pet
    default: true

  - name: default_pet_id
    type: string
    label: Default Pet
    default: ""

  - name: pet_scale
    type: float
    label: Scale
    default: 0.5
    minimum: 0.5
    maximum: 2.0

  - name: show_status_bubble
    type: boolean
    label: Show Status Bubble
    default: true

  - name: bubble_offset_x
    type: integer
    label: Bubble Offset X
    default: 12
    minimum: -240
    maximum: 240

  - name: bubble_offset_y
    type: integer
    label: Bubble Offset Y
    default: -12
    minimum: -240
    maximum: 240

  - name: jump_on_hover
    type: boolean
    label: Jump on Hover
    default: true

  - name: running_prefix
    type: string
    label: Running Prefix
    default: "正在"

  - name: position
    type: json
    label: Pet Position
    default:
      mode: default
      x: null
      y: null

  - name: bubble_texts
    type: json
    label: Bubble Texts
    default:
      idle: ""
      waiting: "等你一下"
      done: "完成啦"
      failed: "出错了"
      cancelled: "已取消"
      interrupted: "已中断"
      wake: "我来啦"
      tuck: "先睡一会儿"
      status: "我在这里"
      select: "换好啦"
      reload: "重新扫描完成"
      no_pet: "还没有可用的宠物"
      import_success: "导入成功"
      import_failed: "导入失败"
      delete_success: "已删除"
      delete_failed: "删除失败"

  - name: command_texts
    type: json
    label: Command Texts
    default:
      wake: "\u5df2\u5524\u9192 {pet.display_name}"
      tuck: "{pet.display_name} \u5df2\u6682\u79bb"
      select: "\u5df2\u5207\u6362\u4e3a {pet.display_name}\u3002\n{pet.description}"
      status: "\u5f53\u524d pet\uff1a{pet.display_name}"
      reload: "\u5df2\u91cd\u65b0\u626b\u63cf pet\uff1a{valid_count} \u4e2a\u53ef\u7528\uff0c{invalid_count} \u4e2a\u65e0\u6548"
      no_pet: "\u8fd8\u6ca1\u6709\u53ef\u7528\u7684 pet"
      select_missing: "\u672a\u627e\u5230\u53ef\u7528 pet\uff1a{pet_id}"

methods:
  - id: command
    description: Control the Workbench Pet overlay from the /pet slash command.
    input_schema:
      args:
        type: string
        required: false
    output:
      type: markdown

  - id: get_settings
    description: Return resolved Pet capability settings.
    input_schema: {}
    output:
      type: json

  - id: update_settings
    description: Update Pet capability settings.
    input_schema:
      values:
        type: json
        required: true
    output:
      type: json

  - id: list_pets
    description: List Codex-compatible pet directories under data/pet.
    input_schema: {}
    output:
      type: json

  - id: scan_pets
    description: Rescan Codex-compatible pet directories under data/pet.
    input_schema: {}
    output:
      type: json

  - id: validate_pet
    description: Validate one Codex-compatible pet under data/pet.
    input_schema:
      pet_id:
        type: string
        required: true
    output:
      type: json

  - id: delete_pet
    description: Delete one non-builtin pet under data/pet.
    input_schema:
      pet_id:
        type: string
        required: true
    output:
      type: json

  - id: import_pet
    description: Import one Codex-compatible pet from uploaded pet.json and spritesheet.webp bytes.
    input_schema:
      pet_json:
        type: json
        required: true
      spritesheet:
        type: json
        required: true
    output:
      type: json

commands:
  - name: /pet
    method: command
    description: Control the Workbench Pet overlay.
    safe: true
