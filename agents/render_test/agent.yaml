id: render_test
name: Render Test Agent
type: script
description: Tiny fixture agent for text, markdown, and JSON rendering checks
entry: agent.py

actions:
  - id: default
    description: Reply with markdown for renderer checks
  - id: json
    label: JSON
    description: Reply with structured JSON for renderer checks
  - id: text
    label: Text
    description: Reply with plain text for renderer checks
  - id: llm
    label: LLM
    description: Attempt one LLM call for diagnostics checks

context_policy:
  mode: current_message
  max_messages: 1
  max_chars: 4000

model_lifecycle:
  load: on_demand
  unload: manual
  unload_failure: warn
