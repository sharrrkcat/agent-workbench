id: comfyui_agent
name: ComfyUI Agent
type: script
description: ComfyUI workflow/preset recipe and generation agent.
entry: agent.py

capabilities:
  - comfyui
  - llm

actions:
  - id: default
    label: Generate
    description: Use the current session recipe input_mode to update the prompt, then generate images.
  - id: form
    label: Recipe Form
    description: Show the current session ComfyUI recipe form.
  - id: save_recipe_from_form
    label: Save Recipe
    description: Save submitted form values into the current session recipe without generating images.
    callable: false
  - id: switch
    label: Switch Mode
    description: Switch the current recipe input_mode between llm and raw.
  - id: raw
    label: Raw Prompt
    description: Force raw for this request, write positive_prompt, keep the session input_mode unchanged, then generate images.
  - id: llm
    label: LLM Prompt
    description: Force LLM prompt enhancement for this request using llm_operation_default, keep the session input_mode unchanged, then optionally generate images.
  - id: fresh
    label: Fresh LLM Prompt
    description: One-shot LLM prompt generation using only the user request; does not change input_mode or llm_operation_default.
  - id: refine
    label: Refine LLM Prompt
    description: One-shot LLM prompt generation using the current positive_prompt plus the user request; does not change input_mode or llm_operation_default.
  - id: run
    label: Run Recipe
    description: Generate images from the current session recipe without changing prompt or parameters.
  - id: presets
    label: Presets
    description: List local ComfyUI presets.
  - id: scan_workflows
    label: Scan Workflows
    description: Scan local ComfyUI workflow and preset library and create draft presets when enabled.
  - id: status
    label: Status
    description: Check ComfyUI connection, asset directories, and current recipe status.

config_schema:
  - name: default_preset_id
    type: string
    label: Default preset id
    default: ""
    description: Default preset id used when a session has no recipe.
  - name: default_input_mode
    type: enum
    label: Default input mode
    options:
      - llm
      - raw
    default: llm
    description: How normal user messages are interpreted by default.
  - name: llm_operation_default
    type: enum
    label: Default LLM operation
    options:
      - refine
      - fresh
    default: refine
    description: Controls how normal LLM-mode input updates the positive prompt. refine uses the current positive prompt plus the user input; fresh uses only the user input.
  - name: llm_refine_system_prompt
    type: text
    label: LLM refine system prompt
    default: |
      Use the current positive_prompt and the user's new request to produce a complete new positive_prompt.
      Return only the complete positive prompt, not a diff.
      Do not choose workflow, steps, cfg, sampler, scheduler, seed, width, height, or any other recipe parameter.
    description: Recommended system prompt for refine operation.
  - name: llm_refine_user_template
    type: text
    label: LLM refine user template
    default: |
      User request:
      {user_input}

      Current positive prompt:
      {positive_prompt}

      Current negative prompt:
      {negative_prompt}

      Preset:
      {preset_name} ({preset_id})

      Input mode: {input_mode}
      LLM operation: {llm_operation}
    description: Recommended user template for refine operation. Supports user_input, positive_prompt, negative_prompt, preset_id, preset_name, input_mode, and llm_operation.
  - name: llm_fresh_system_prompt
    type: text
    label: LLM fresh system prompt
    default: |
      Use only the user's request to produce a complete positive_prompt.
      Do not reference the current positive_prompt.
      Do not choose workflow, steps, cfg, sampler, scheduler, seed, width, height, or any other recipe parameter.
    description: Recommended system prompt for fresh operation.
  - name: llm_fresh_user_template
    type: text
    label: LLM fresh user template
    default: |
      User request:
      {user_input}

      Current negative prompt:
      {negative_prompt}

      Preset:
      {preset_name} ({preset_id})

      Input mode: {input_mode}
      LLM operation: {llm_operation}
    description: Recommended user template for fresh operation. Supports user_input, negative_prompt, preset_id, preset_name, input_mode, and llm_operation.
  - name: auto_run_after_llm_prompt
    type: boolean
    label: Auto-run after LLM prompt
    default: true
    description: When true, LLM mode generates the positive prompt and immediately submits the current recipe. When false, LLM mode only saves the generated positive prompt so the user can inspect or edit it before running.
  - name: default_seed_policy
    type: enum
    label: Default seed policy
    options:
      - random
      - fixed
      - reuse
    default: random
    description: Seed policy for generation.
  - name: unload_llm_before_generation
    type: boolean
    label: Unload LLM before generation
    default: true
    description: Unload the prompt enhancer model before ComfyUI execution when possible.

context_policy:
  mode: current_message
  max_messages: 1
  max_chars: 4000

model_lifecycle:
  load: on_demand
  unload: manual
  unload_failure: warn
