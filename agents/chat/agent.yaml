id: chat
name: Chat Agent
type: prompt
description: Default chat agent
avatar: ""

actions:
  - id: default
    description: Normal multi-turn chat

model:
  provider: openai_compatible
  base_url: http://localhost:1234/v1
  model: qwen2.5-3b-instruct

prompt: |
  You are a concise, reliable assistant.

context_policy:
  mode: session
  max_messages: 20
  max_chars: 12000

model_lifecycle:
  load: on_demand
  unload: never
  unload_failure: warn

