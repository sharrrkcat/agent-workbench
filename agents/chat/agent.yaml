id: chat
name: Chat Agent
type: prompt
description: Default chat agent
avatar: ""
capabilities:
  - llm

config_schema:
  - name: temperature
    type: float
    label: Temperature
    required: false
    description: Optional prompt-agent tuning placeholder for later runtime config.

actions:
  - id: default
    description: Normal multi-turn chat

prompt: |
  You are a concise, reliable assistant.

context_policy:
  mode: session
  max_messages: 20
  max_chars: 12000

model_lifecycle:
  load: on_demand
  unload: never
  unload_failure: warn
